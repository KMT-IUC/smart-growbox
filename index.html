<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BioGrow Lab - Cultivation Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "inverse-surface": "#2e3132",
              "inverse-on-surface": "#f0f1f2",
              "primary": "#3d6751",
              "secondary": "#366666",
              "tertiary": "#85522c",
              "surface": "#f8f9fa",
              "surface-bright": "#f8f9fa",
              "on-surface": "#191c1d",
              "on-surface-variant": "#414943",
              "error": "#ba1a1a"
            },
            "borderRadius": { "DEFAULT": "8px", "lg": "12px", "xl": "16px", "full": "9999px" },
            "spacing": { "container-max": "1440px", "margin-desktop": "40px", "gutter": "24px" },
            "fontFamily": { "sans": ['Inter', 'sans-serif'] }
          }
        }
      }
    </script>
<style>
        .neumorphic-convex { box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff; }
        .neumorphic-convex-sm { box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff; }
        .neumorphic-inset { box-shadow: inset 6px 6px 12px #d1d9e6, inset -6px -6px 12px #ffffff; }
        .dark .neumorphic-convex { box-shadow: 8px 8px 16px rgba(0,0,0,0.5), -8px -8px 16px rgba(255,255,255,0.05); }
        .dark .neumorphic-convex-sm { box-shadow: 4px 4px 8px rgba(0,0,0,0.5), -4px -4px 8px rgba(255,255,255,0.05); }
        .dark .neumorphic-inset { box-shadow: inset 6px 6px 12px rgba(0,0,0,0.5), inset -6px -6px 12px rgba(255,255,255,0.05); }
        body, div, button { transition: background-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease; }
        .dark input, .dark select { background-color: #1e1f20; color: #f0f1f2; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface-bright dark:bg-inverse-surface text-on-surface dark:text-inverse-on-surface overflow-hidden h-screen flex">

<!-- SideNavBar -->
<aside class="hidden md:flex flex-col p-6 space-y-4 h-screen w-64 bg-surface dark:bg-inverse-surface shadow-[8px_0_15px_rgba(0,0,0,0.03)] dark:shadow-[8px_0_15px_rgba(0,0,0,0.4)] z-50">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 rounded-xl neumorphic-convex flex items-center justify-center bg-primary/10 text-primary">
            <span class="material-symbols-outlined">biotech</span>
        </div>
        <div>
            <h1 class="font-bold text-primary text-lg">System Core</h1>
            <p class="text-[10px] text-on-surface-variant">v2.4 Organic Lab</p>
        </div>
    </div>
    <nav class="flex-1 space-y-3">
        <div class="flex items-center gap-3 p-3 bg-primary/10 text-primary rounded-xl shadow-inner cursor-pointer">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-medium">Dashboard</span>
        </div>
        <a href="/analytics" class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-white/20 rounded-xl transition-all">
            <span class="material-symbols-outlined">bar_chart</span>
            <span class="font-medium">Analytics</span>
        </a>
        
    </nav>
    
</aside>

<!-- Main Content -->
<main class="flex-1 flex flex-col h-screen overflow-hidden">
    <header class="flex justify-between items-center px-margin-desktop py-4 h-20 bg-surface dark:bg-inverse-surface shadow-md z-40">
        <h2 class="text-2xl font-bold text-primary">BioGrow Lab</h2>
        <div class="flex items-center gap-6">
            <span onclick="toggleTheme()" class="material-symbols-outlined cursor-pointer" id="theme-icon">dark_mode</span>
            <div class="w-10 h-10 rounded-full neumorphic-convex overflow-hidden border-2 border-white cursor-pointer" onclick="document.getElementById('profile-upload').click()">
                <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="uploadProfile(event)"/>
                <img id="profile-img" class="w-full h-full object-cover" src="https://via.placeholder.com/40"/>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-margin-desktop">
        <div class="max-w-container-max mx-auto grid grid-cols-12 gap-gutter">
            <!-- 3 Ana Kart: Sıcaklık, Nem, CO2 -->
            <div class="col-span-12 md:col-span-3 neumorphic-convex p-6 bg-surface rounded-xl">
                <h3 class="text-sm font-semibold text-on-surface-variant">Sıcaklık</h3>
                <div class="flex justify-center items-center mt-4">
                    <div class="relative w-32 h-32 neumorphic-inset rounded-full flex items-center justify-center">
                        <span class="text-4xl font-bold text-primary" id="temp-value">--</span>
                        <span class="text-xl">°C</span>
                    </div>
                </div>
                <p class="text-center mt-3 text-sm" id="temp-status">--</p>
            </div>
            <div class="col-span-12 md:col-span-3 neumorphic-convex p-6 bg-surface rounded-xl">
                <h3 class="text-sm font-semibold text-on-surface-variant">Nem</h3>
                <div class="flex justify-center items-center mt-4">
                    <div class="relative w-32 h-32 neumorphic-inset rounded-full flex items-center justify-center">
                        <span class="text-4xl font-bold text-secondary" id="humidity-value">--</span>
                        <span class="text-xl">%</span>
                    </div>
                </div>
            </div>
            <div class="col-span-12 md:col-span-3 neumorphic-convex p-6 bg-surface rounded-xl">
                <h3 class="text-sm font-semibold text-on-surface-variant">CO₂</h3>
                <div class="flex justify-center items-center mt-4">
                    <div class="relative w-32 h-32 neumorphic-inset rounded-full flex items-center justify-center">
                        <span class="text-4xl font-bold text-tertiary" id="co2-value">--</span>
                        <span class="text-xl">ppm</span>
                    </div>
                </div>
                <p class="text-center mt-3 text-xs text-error" id="co2-status"></p>
            </div>
            <div class="col-span-12 md:col-span-3 neumorphic-convex p-6 bg-surface rounded-xl">
                <h3 class="text-sm font-semibold text-on-surface-variant">Toprak Nemi</h3>
                <div class="flex justify-center items-center mt-4">
                    <div class="relative w-32 h-32 neumorphic-inset rounded-full flex items-center justify-center">
                        <span class="text-4xl font-bold text-blue-600 dark:text-blue-400" id="soil-moisture-value">--</span>
                        <span class="text-xl">%</span>
                    </div>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2 mt-3">
                    <div id="soil-bar" class="bg-blue-600 h-2 rounded-full" style="width:0%"></div>
                </div>
            </div>

            <!-- Aktüatör Durumları (Fan & Pompa) -->
            <div class="col-span-12 md:col-span-6 neumorphic-convex p-6 bg-surface rounded-xl">
                <h3 class="text-lg font-semibold mb-4">Aktüatör Durumları</h3>
                <div class="flex justify-around">
                    <div class="text-center">
                        <span class="material-symbols-outlined text-4xl text-primary">air</span>
                        <p class="font-bold">Fan</p>
                        <span id="fan-status" class="inline-block px-3 py-1 rounded-full text-sm bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200">Bekleniyor</span>
                    </div>
                    <div class="text-center">
                        <span class="material-symbols-outlined text-4xl text-secondary">water_drop</span>
                        <p class="font-bold">Pompa</p>
                        <span id="pump-status" class="inline-block px-3 py-1 rounded-full text-sm bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200">Bekleniyor</span>
                    </div>
                </div>
            </div>

            <!-- Son Ölçüm Zamanı -->
            <div class="col-span-12 md:col-span-6 neumorphic-convex p-6 bg-surface rounded-xl flex items-center justify-between">
                <span class="material-symbols-outlined text-3xl">schedule</span>
                <div>
                    <p class="text-sm text-on-surface-variant">Son Ölçüm</p>
                    <p id="last-update" class="font-mono text-sm">--</p>
                </div>
                <button onclick="refreshDashboard()" class="neumorphic-convex-sm p-2 rounded-full">
                    <span class="material-symbols-outlined">refresh</span>
                </button>
            </div>
        </div>
    </div>
</main>

<!-- Toast & Modals (kısaltılmış) -->
<div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 px-6 py-3 bg-black text-white rounded-xl text-sm opacity-0 pointer-events-none transition-all duration-300 z-[999]">Mesaj</div>
<div id="new-batch-modal" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[998]">
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 w-96">
        <h3 class="text-xl font-bold mb-4">Yeni Batch</h3>
        <input type="text" id="batch-id" placeholder="Batch ID" class="w-full p-2 border rounded mb-2">
        <select id="batch-type" class="w-full p-2 border rounded mb-4"><option>Oyster</option><option>Shiitake</option></select>
        <div class="flex justify-end gap-2">
            <button onclick="closeNewBatchModal()" class="px-4 py-2 bg-gray-300 rounded">İptal</button>
            <button onclick="createBatch()" class="px-4 py-2 bg-primary text-white rounded">Oluştur</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = '';
    let ws = null;

    function updateUI(data) {
        if (data.sicaklik !== undefined) {
            document.getElementById('temp-value').innerText = data.sicaklik.toFixed(1);
            let status = document.getElementById('temp-status');
            if (data.sicaklik < 22) status.innerText = '❄️ Düşük';
            else if (data.sicaklik > 26) status.innerText = '🔥 Yüksek';
            else status.innerText = '✅ Optimum';
        }
        if (data.nem !== undefined) document.getElementById('humidity-value').innerText = Math.round(data.nem);
        if (data.co2 !== undefined) {
            document.getElementById('co2-value').innerText = data.co2;
            let co2Status = document.getElementById('co2-status');
            if (data.co2 > 1000) co2Status.innerText = '⚠️ Kritik';
            else if (data.co2 > 800) co2Status.innerText = '⚠️ Yüksek';
            else co2Status.innerText = '✅ Normal';
        }
        if (data.toprak_nemi !== undefined) {
            let soil = data.toprak_nemi;
            document.getElementById('soil-moisture-value').innerText = Math.round(soil);
            document.getElementById('soil-bar').style.width = `${Math.min(100, soil)}%`;
        }
        if (data.fan_aktif !== undefined) {
            let fanSpan = document.getElementById('fan-status');
            if (data.fan_aktif === 1) {
                fanSpan.innerText = '✅ Aktif';
                fanSpan.className = "inline-block px-3 py-1 rounded-full text-sm bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-200";
            } else {
                fanSpan.innerText = '⭕ Pasif';
                fanSpan.className = "inline-block px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300";
            }
        }
        if (data.pompa_aktif !== undefined) {
            let pumpSpan = document.getElementById('pump-status');
            if (data.pompa_aktif === 1) {
                pumpSpan.innerText = '💧 Aktif';
                pumpSpan.className = "inline-block px-3 py-1 rounded-full text-sm bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-200";
            } else {
                pumpSpan.innerText = '⭕ Pasif';
                pumpSpan.className = "inline-block px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300";
            }
        }
        if (data.zaman) {
            let d = new Date(data.zaman);
            document.getElementById('last-update').innerText = d.toLocaleString();
        }
    }

    async function fetchLast() {
        try {
            const res = await fetch(`${API_BASE}/api/son-olcum`);
            if (res.ok) {
                const data = await res.json();
                if (data) updateUI(data);
            }
        } catch(e) { console.warn(e); }
    }

    function setupWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                updateUI(data);
            } catch(err) {}
        };
        ws.onclose = () => setTimeout(setupWebSocket, 3000);
    }

    function refreshDashboard() { fetchLast(); showToast('Veriler yenilendi'); }
    function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.classList.remove('opacity-0'); t.classList.add('opacity-100'); setTimeout(() => { t.classList.add('opacity-0'); t.classList.remove('opacity-100'); }, 2000); }
    function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    function uploadProfile(e) { if(e.target.files[0]) { let reader = new FileReader(); reader.onload = ev => document.getElementById('profile-img').src = ev.target.result; reader.readAsDataURL(e.target.files[0]); } }
    function openNewBatchModal() { document.getElementById('new-batch-modal').classList.remove('hidden'); }
    function closeNewBatchModal() { document.getElementById('new-batch-modal').classList.add('hidden'); }
    function createBatch() { closeNewBatchModal(); showToast('Batch oluşturuldu'); }

    fetchLast();
    setupWebSocket();
</script>
</body>
</html>
